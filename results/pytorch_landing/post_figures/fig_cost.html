<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>What a datapoint costs — dashboard vs corpus</title>
<style>
  :root { color-scheme: light; }
  html,body { margin:0; padding:0; background:#f9f9f7; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; }
  .viz-root { position:relative; width:952px; margin:28px auto; background:#fcfcfb;
    border:1px solid rgba(11,11,11,0.10); border-radius:8px; padding:22px 26px 18px; box-sizing:border-box; }
  h1 { font-size:17px; font-weight:650; color:#0b0b0b; margin:0 0 3px; letter-spacing:-0.01em; }
  .sub { font-size:13px; color:#52514e; margin:0 0 14px; }
  .foot { font-size:11px; color:#898781; margin-top:10px; line-height:1.45; }
  svg { display:block; }
  svg text { font-family:system-ui,-apple-system,"Segoe UI",sans-serif; }
</style></head>
<body>
<figure class="viz-root" style="margin:28px auto;">
  <h1>What a datapoint costs &#8212; dashboard vs corpus</h1>
  <p class="sub">same rows, two measures &#183; linear scale from zero &#183; the tiny bars are the message</p>
  <svg width="900" height="160" viewBox="0 0 900 160" role="img" aria-label="GPU-hours and wall-clock per datapoint: nightly dashboard 47.5 GPU-hours and 592 minutes, corpus cold 2.4 GPU-hours and 36 minutes, corpus warm 0.9 GPU-hours and 14 minutes">
    <text x="170" y="24" font-size="12.5" font-weight="650" fill="#0b0b0b" text-anchor="start">GPU-hours per datapoint</text>
    <text x="490" y="24" font-size="12.5" font-weight="650" fill="#0b0b0b" text-anchor="start">Wall-clock to signal (min)</text>

    <!-- zero baselines -->
    <line x1="170" y1="34" x2="170" y2="118" stroke="#c3c2b7" stroke-width="1"/>
    <line x1="490" y1="34" x2="490" y2="118" stroke="#c3c2b7" stroke-width="1"/>

    <!-- row labels -->
    <text x="160" y="52"  font-size="11.5" fill="#52514e" text-anchor="end">nightly dashboard</text>
    <text x="160" y="80"  font-size="11.5" fill="#52514e" text-anchor="end">corpus cold</text>
    <text x="160" y="108" font-size="11.5" fill="#52514e" text-anchor="end">corpus warm (A/B loop)</text>

    <!-- GPU-hours panel: 260px = 47.5 GPU-hr -->
    <path d="M170,40 L426,40 Q430,40 430,44 L430,52 Q430,56 426,56 L170,56 Z" fill="#2a78d6"/>
    <text x="424" y="52" font-size="11" font-weight="650" fill="#ffffff" text-anchor="end">47.5</text>
    <path d="M170,68 L179.1,68 Q183.1,68 183.1,72 L183.1,80 Q183.1,84 179.1,84 L170,84 Z" fill="#2a78d6"/>
    <text x="188" y="80" font-size="11" font-weight="650" fill="#0b0b0b" text-anchor="start">2.4</text>
    <rect x="170" y="96" width="4.9" height="16" fill="#2a78d6"/>
    <text x="180" y="108" font-size="11" font-weight="650" fill="#0b0b0b" text-anchor="start">0.9</text>

    <!-- Wall-clock panel: 260px = 592 min -->
    <path d="M490,40 L746,40 Q750,40 750,44 L750,52 Q750,56 746,56 L490,56 Z" fill="#2a78d6"/>
    <text x="744" y="52" font-size="11" font-weight="650" fill="#ffffff" text-anchor="end">592 (9h52m)</text>
    <path d="M490,68 L501.8,68 Q505.8,68 505.8,72 L505.8,80 Q505.8,84 501.8,84 L490,84 Z" fill="#2a78d6"/>
    <text x="511" y="80" font-size="11" font-weight="650" fill="#0b0b0b" text-anchor="start">36</text>
    <rect x="490" y="96" width="6.1" height="16" fill="#2a78d6"/>
    <text x="501" y="108" font-size="11" font-weight="650" fill="#0b0b0b" text-anchor="start">14</text>

    <!-- annotation -->
    <text x="450" y="148" font-size="12" fill="#52514e" text-anchor="middle">one nightly budget &#8776; one HEAD datapoint &#8212; or an entire per-commit attribution walk</text>
  </svg>
  <p class="foot">Nightly: <code>inductor-perf-nightly-h100</code>, 47.5 GPU-hours / 9h52m wall-clock per run. Corpus: all ~5,000 points on 4&#215;B200, ~36 min cold (fresh compile caches), ~14 min per datapoint warm inside an A/B loop (shared Triton caches).</p>
</figure>
</body></html>
